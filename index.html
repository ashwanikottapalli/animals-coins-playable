<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>Animals &amp; Coins</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #0b1f17;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #fff;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  #app { position: fixed; inset: 0; }
  #gameCanvas { display: block; width: 100%; height: 100%; touch-action: none; }

  /* HUD: plank counter */
  #hud {
    position: absolute; top: 24px; left: 0; right: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
    font-weight: 800;
    text-shadow: 0 3px 10px rgba(0,0,0,0.55);
  }
  #plankCount {
    font-size: 56px; line-height: 1;
    letter-spacing: -1px;
    transition: transform 0.12s ease;
  }
  #plankCount.pop { transform: scale(1.25); }
  #plankX { font-size: 36px; margin: 0 6px 0 4px; opacity: 0.95; }
  #plankIcon {
    width: 56px; height: 22px;
    background: linear-gradient(180deg, #5fd8d8 0%, #2faaaa 60%, #1c7878 100%);
    border-radius: 4px;
    box-shadow: inset 0 0 0 2px rgba(255,255,255,0.18), 0 4px 10px rgba(0,0,0,0.35);
    transform: rotate(-12deg);
  }

  /* Intro overlay */
  #intro {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0.75) 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 10;
    cursor: pointer;
    transition: opacity 0.4s ease;
  }
  #intro h1 { font-size: 44px; letter-spacing: 1px; margin-bottom: 12px; text-align: center; }
  #intro p {
    font-size: 22px; opacity: 0.9; margin-bottom: 32px; text-align: center;
    animation: pulse 1.4s ease-in-out infinite;
  }
  #intro .tap-icon {
    width: 80px; height: 80px; border-radius: 50%;
    background: rgba(255,255,255,0.18);
    display: flex; align-items: center; justify-content: center;
    font-size: 38px;
    animation: tapPulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }
  @keyframes tapPulse {
    0%,100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,255,255,0.35); }
    50%     { transform: scale(1.08); box-shadow: 0 0 0 18px rgba(255,255,255,0); }
  }

  /* CTA overlay */
  #cta {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.85) 100%);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    z-index: 11;
  }
  #cta.show { display: flex; animation: fadeIn 0.5s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  #cta h2 { font-size: 38px; margin-bottom: 6px; text-align: center; }
  #cta .sub { font-size: 18px; opacity: 0.9; margin-bottom: 36px; text-align: center; }
  #playBtn {
    background: linear-gradient(180deg, #ffcb3a 0%, #f59c1a 100%);
    color: #2a1700;
    border: none; border-radius: 50px;
    padding: 20px 56px;
    font-size: 26px; font-weight: 900;
    letter-spacing: 1px;
    cursor: pointer;
    box-shadow: 0 10px 24px rgba(245,156,26,0.55), inset 0 -4px 0 rgba(0,0,0,0.18);
    animation: btnPulse 1.4s ease-in-out infinite;
  }
  @keyframes btnPulse {
    0%,100% { transform: scale(1); }
    50%     { transform: scale(1.05); }
  }

  /* Fail/result overlay (Phase 1: simple) */
  #fail {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.7);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    z-index: 9;
  }
  #fail.show { display: flex; }
  #fail h2 { font-size: 32px; margin-bottom: 18px; }
  #fail button {
    background: #fff; color: #111; border: none; border-radius: 40px;
    padding: 14px 32px; font-size: 18px; font-weight: 800; cursor: pointer;
  }
</style>
</head>
<body>
  <div id="app">
    <canvas id="gameCanvas"></canvas>

    <div id="hud">
      <span id="plankCount">0</span>
      <span id="plankX">x</span>
      <span id="plankIcon"></span>
    </div>

    <div id="intro">
      <h1>Animals &amp; Coins</h1>
      <p>Tap to Play</p>
      <div class="tap-icon">👆</div>
    </div>

    <div id="fail">
      <h2>Oops! Try again</h2>
      <button id="retryBtn">Retry</button>
    </div>

    <div id="cta">
      <h2 id="ctaTitle">Animals &amp; Coins</h2>
      <p class="sub">Run, collect, and build your way to victory!</p>
      <button id="playBtn">PLAY NOW</button>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
