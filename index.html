<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>Animals &amp; Coins</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #000;        /* letterbox bars on landscape viewports */
    font-family: 'Fredoka', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #fff;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  /* Force a 9:16 portrait playable area, regardless of viewport. */
  /* On mobile portrait the box fills the screen; on desktop / mobile  */
  /* landscape it sits centered with dark bars on the sides.            */
  #app {
    position: fixed;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    aspect-ratio: 9 / 16;
    width:  min(100vw, calc(100vh * 9 / 16));
    height: min(100vh, calc(100vw * 16 / 9));
    overflow: hidden;
    background: #0b1f17;
  }
  #gameCanvas { display: block; width: 100%; height: 100%; touch-action: none; }

  /* HUD: plank counter */
  #hud {
    position: absolute; top: 24px; left: 0; right: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
    font-weight: 800;
    text-shadow: 0 3px 10px rgba(0,0,0,0.55);
  }
  #plankCount {
    font-size: 56px; line-height: 1;
    letter-spacing: -1px;
    transition: transform 0.12s ease;
  }
  #plankCount.pop { transform: scale(1.25); }
  #plankX { font-size: 36px; margin: 0 6px 0 4px; opacity: 0.95; }
  #plankIcon {
    width: 56px; height: 22px;
    background: linear-gradient(180deg, #5fd8d8 0%, #2faaaa 60%, #1c7878 100%);
    border-radius: 4px;
    box-shadow: inset 0 0 0 2px rgba(255,255,255,0.18), 0 4px 10px rgba(0,0,0,0.35);
    transform: rotate(-12deg);
  }


  /* CTA / Win overlay */
  #cta {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(20,30,25,0.55) 0%, rgba(0,0,0,0.85) 100%);
    backdrop-filter: blur(2px);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    z-index: 11;
    padding: 0 24px;
  }
  #cta.show { display: flex; animation: fadeIn 0.5s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
  #ctaLogo {
    width: 160px; height: 160px;
    border-radius: 36px;
    box-shadow:
      0 14px 32px rgba(0,0,0,0.45),
      0 0 0 5px rgba(255,255,255,0.95),
      inset 0 -4px 0 rgba(0,0,0,0.10);
    margin-bottom: 22px;
    object-fit: cover;
    animation: logoFloat 3s ease-in-out infinite;
  }
  @keyframes logoFloat {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-6px); }
  }
  #cta h2 {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: 50px;
    color: #ffce3c;
    -webkit-text-stroke: 5px #2b1a06;
    paint-order: stroke fill;
    /* 3D extruded sticker effect */
    text-shadow:
      0 5px 0 #b87a16,
      0 10px 0 #5a3a05,
      0 16px 20px rgba(0,0,0,0.45);
    text-align: center;
    margin-bottom: 14px;
    letter-spacing: -0.5px;
    line-height: 1.0;
  }
  #cta .sub {
    font-family: 'Fredoka', sans-serif;
    font-weight: 500;
    font-size: 17px;
    opacity: 0.94;
    margin-bottom: 32px;
    text-align: center;
    max-width: 80%;
    line-height: 1.4;
    color: #fff;
  }
  #playBtn {
    position: relative;
    background: linear-gradient(180deg, #ffcb3a 0%, #f59c1a 100%);
    color: #2a1700;
    border: none; border-radius: 50px;
    padding: 22px 60px;
    font-family: 'Fredoka', sans-serif;
    font-size: 28px; font-weight: 700;
    letter-spacing: 0.8px;
    cursor: pointer;
    box-shadow:
      0 10px 28px rgba(245,156,26,0.55),
      0 0 0 4px rgba(255,255,255,0.95),
      inset 0 -5px 0 rgba(0,0,0,0.20);
    animation: btnPulse 1.3s ease-in-out infinite;
    overflow: hidden;
  }
  /* Subtle shine sweep on the play button */
  #playBtn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45), transparent);
    animation: btnShine 2.4s ease-in-out infinite;
  }
  @keyframes btnPulse {
    0%,100% { transform: scale(1); }
    50%     { transform: scale(1.06); }
  }
  @keyframes btnShine {
    0%   { left: -100%; }
    60%  { left: 120%; }
    100% { left: 120%; }
  }
  /* Secondary action under the primary CTA. Hidden by default; shown on fail. */
  #retryBtn {
    margin-top: 16px;
    background: transparent;
    border: none;
    color: rgba(255,255,255,0.75);
    font-family: 'Fredoka', sans-serif;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    padding: 8px 18px;
    text-decoration: underline;
    text-underline-offset: 4px;
    transition: color 0.2s ease;
    display: none;
  }
  #retryBtn:hover { color: #fff; }
  #cta.fail #retryBtn { display: inline-block; }

  /* Loading splash — shown until all assets are decoded. */
  #loading {
    position: absolute; inset: 0;
    z-index: 12;
    background: linear-gradient(180deg, #2c4434 0%, #1a2820 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 0.45s ease;
  }
  #loading.hidden { opacity: 0; pointer-events: none; visibility: hidden; }
  #loading .ld-title {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: 44px;
    letter-spacing: -0.5px;
    color: #ffce3c;
    -webkit-text-stroke: 4px #2b1a06;
    paint-order: stroke fill;
    /* Stacked drop shadows = 3D extruded sticker */
    text-shadow:
      0 4px 0 #b87a16,
      0 8px 0 #5a3a05,
      0 14px 18px rgba(0,0,0,0.40);
    margin-bottom: 28px;
    text-align: center;
    line-height: 1;
  }
  #loading .ld-bar {
    width: 60%; max-width: 320px; height: 14px;
    background: rgba(255,255,255,0.12);
    border-radius: 7px;
    overflow: hidden;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
  }
  #loading .ld-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #ffd83a 0%, #ff9b5e 100%);
    border-radius: 7px;
    transition: width 0.2s ease-out;
  }
  #loading .ld-pct {
    margin-top: 12px;
    font-size: 14px; opacity: 0.75;
    letter-spacing: 1px;
  }

  /* Tutorial overlay — shown after Tap-to-Play, dismisses on first drag */
  #tutorial {
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 8;
    transition: opacity 0.4s ease;
  }
  #tutorial.hidden { opacity: 0; pointer-events: none; visibility: hidden; }

  /* Goal-hint cloud bubble — positioned just above-right of bear's head.
     transform-origin near the bottom-left makes the pulse "anchor" toward
     the bear, reinforcing the thought-bubble feel. */
  #tutorialBubble {
    position: absolute;
    top: 46%;
    left: 58%;
    width: 170px;
    height: auto;
    transform-origin: 22% 88%;
    animation: bubblePulse 1.4s ease-in-out infinite;
    filter: drop-shadow(0 8px 14px rgba(0,0,0,0.22));
  }
  @keyframes bubblePulse {
    0%,100% { transform: scale(1); }
    50%     { transform: scale(1.08); }
  }

  /* Static "Drag to Move + arrow" image — sits low on screen, out of gameplay area. */
  #tutorialArrow {
    position: absolute;
    bottom: 7%;
    left: 50%;
    transform: translateX(-50%);
    width: 70%;
    max-width: 520px;
    height: auto;
    filter: drop-shadow(0 6px 0 rgba(0,0,0,0.20));
  }

  /* Finger: placed as a zero-width anchor at horizontal center, then the inner
     img is shifted left by -50% of its own width to center it. Animation runs
     on the img's transform so it doesn't fight the centering. */
  #tutorial { container-type: inline-size; }
  #tutorialFingerWrap {
    position: absolute;
    bottom: 1%;
    left: 50%;
    width: 0;          /* zero-width anchor — children center via translateX(-50%) below */
    pointer-events: none;
  }
  #tutorialFinger {
    display: block;
    width: 170px;
    height: auto;
    margin-top: -50px;
    /* anim moves it ±32% of the playable area; the (-50%) keeps it centered over the anchor */
    animation: fingerSwipe 1.6s ease-in-out infinite;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.30));
  }
  /* Asymmetric — left tip clipped slightly so finger doesn't overflow past the
     arrow's left edge while keeping the full right reach. */
  @keyframes fingerSwipe {
    0%,100% { transform: translateX(calc(-50% - 26cqw)); }
    50%     { transform: translateX(calc(-50% + 32cqw)); }
  }

  /* Floating gate indicator ("+10", "x3", "-2") that rises and fades from
     above the bear after a math-gate hit. */
  .floatTxt {
    position: absolute;
    transform: translate(-50%, -50%);
    font-size: 56px;
    font-weight: 900;
    -webkit-text-stroke: 5px #fff;
    paint-order: stroke fill;
    text-shadow: 0 6px 0 rgba(0,0,0,0.25);
    pointer-events: none;
    animation: floatRise 0.85s cubic-bezier(.2,.65,.3,1) forwards;
    z-index: 6;
    letter-spacing: 0.5px;
  }
  .floatTxt.good { color: #4cd25c; }
  .floatTxt.bad  { color: #ff5a4d; }
  @keyframes floatRise {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
    20%  { opacity: 1; transform: translate(-50%, -65%) scale(1.15); }
    100% { opacity: 0; transform: translate(-50%, -130%) scale(1); }
  }

</style>
</head>
<body>
  <div id="app">
    <canvas id="gameCanvas"></canvas>

    <div id="hud">
      <span id="plankCount">0</span>
      <span id="plankX">x</span>
      <span id="plankIcon"></span>
    </div>

    <div id="loading">
      <div class="ld-title" id="loadingTitle">Animals &amp; Coins</div>
      <div class="ld-bar"><div class="ld-fill" id="loadingFill"></div></div>
      <div class="ld-pct" id="loadingPct">0%</div>
    </div>

    <div id="tutorial" class="hidden">
      <img id="tutorialBubble" src="assets/textures/cloud_bubble.png" alt="">
      <img id="tutorialArrow"  src="assets/textures/arrow.png"        alt="">
      <div id="tutorialFingerWrap">
        <img id="tutorialFinger" src="assets/textures/finger.png" alt="">
      </div>
    </div>

    <div id="cta">
      <img id="ctaLogo" src="assets/textures/icon.jpg" alt="">
      <h2 id="ctaTitle">Animals &amp; Coins</h2>
      <p class="sub" id="ctaSub">Run, collect, and build your way to victory!</p>
      <button id="playBtn">PLAY NOW</button>
      <button id="retryBtn">Try Again</button>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
